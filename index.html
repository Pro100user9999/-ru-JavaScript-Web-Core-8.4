<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="header__tittle">
      Ремонт техники различных брендов
    </div>
  </header>
  <!-- Slider main container -->
  <div class="swiper">
    <!-- Additional required wrapper -->
    <div class="swiper-wrapper">
      <!-- Slides -->
      <div class="swiper-slide"><img src="./IMG/lenovo.png" alt="lenova"></div>
      <div class="swiper-slide"><img src="./IMG/samsung.png" alt="samsun"></div>
      <div class="swiper-slide"><img src="./IMG/apple.png" alt="apple"></div>
      <div class="swiper-slide"><img src="./IMG/viewsonic.png" alt="viewsonic"></div>
      <div class="swiper-slide"><img src="./IMG/bosh.png" alt="bosh"></div>
      <div class="swiper-slide"><img src="./IMG/hp.png" alt="hp"></div>
      <div class="swiper-slide"><img src="./IMG/acer.png" alt="acer"></div>
      <div class="swiper-slide"><img src="./IMG/sony.png" alt="sony"></div>
      <div class="swiper-slide"><img src="./IMG/lenovo.png" alt="lenovo"></div>
      <div class="swiper-slide"><img src="./IMG/samsung.png" alt="samsung"></div>
      <div class="swiper-slide"><img src="./IMG/apple.png" alt="apple"></div>
      ...
    </div>
    <!-- If we need pagination -->
    <div class="swiper-pagination"></div>

    <!-- If we need navigation buttons -->
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>

    <!-- If we need scrollbar -->
    <div class="swiper-scrollbar"></div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
